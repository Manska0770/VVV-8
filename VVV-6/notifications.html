<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Уведомления</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <main class="content">
      <section class="page notifications-page">
        <section class="info-card filter-scroll">
          <div class="info-header">
            <span class="info-title">Уведомления</span>
          </div>
          <div class="chats-list" id="chatsList">
            <!-- Чаты будут сгенерированы здесь -->
          </div>
        </section>
      </section>
    </main>

    <footer class="actions-footer">
      <div class="settings-menu-wrap">
        <button class="action-btn outline circle settings-btn" id="settingsBtn" aria-label="Настройки" aria-expanded="false">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M5 7.5H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 16.5H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="settings-menu hidden" id="settingsMenu">
          <a class="action-btn outline circle" id="profileBtn" aria-label="Мой профиль" href="profile.html">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 4C14.2091 4 16 5.79086 16 8C16 10.2091 14.2091 12 12 12C9.79086 12 8 10.2091 8 8C8 5.79086 9.79086 4 12 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 20C4 16.6863 6.68629 14 10 14H14C17.3137 14 20 16.6863 20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <button class="action-btn outline circle theme-btn" id="themeToggleBtn" aria-label="Переключить тему" data-theme="default">
            <img width="20" height="20" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAAnElEQVR4nK2UUQ7AIAhDi/H+V3ZfJggtYrJ+LdY+gbkZ7lpi3dqLBUTJ0kMBi3uUvwBg/lDVkRtio6+qOih5UxmXoKkMq3A1DtjQtDZcOLZagXzmyE6WaFTFoMnowihoi82w0vVwDzToOcZOZGf0cgaP+XKGnZafPsUhNnVhSf7ayDaILxVbVnOrYOkeMnVg7R9shD2pesvPMAD4ANMgIzEzlPAHAAAAAElFTkSuQmCC" alt="" aria-hidden="true" style="display:block;" />
          </button>
        </div>
      </div>
      <button class="action-btn outline circle" id="notificationsBtn" aria-label="Уведомления">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.75 9.75a6.75 6.75 0 1 0-13.5 0c0 5.385-3.864 9-3.864 9h21.228s-3.864-3.615-3.864-9Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14.25 21a2.25 2.25 0 1 1-4.5 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="action-btn outline circle" id="filterBtn" aria-label="Фильтр">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 5H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 11H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M10 17H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="18" cy="18" r="3" stroke="currentColor" stroke-width="2"/>
          <path d="M20.5 20.5L22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="action-btn outline circle" id="skipBtn" aria-label="Пропустить">✕</button>
      <button class="action-btn primary circle" id="likeBtn" aria-label="Лайк">❤</button>
    </footer>
  </div>
  <script src="app.js"></script>
  <script src="notifications.js"></script>
</body>
</html>
