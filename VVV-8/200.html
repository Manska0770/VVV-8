<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Поиск пары / выбор</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <main class="content">
      <section class="page profile-page">
        <section class="photo-card">
          <div class="photo photo-back" id="photo"></div>
          <div class="photo photo-front" id="photoNext"></div>
          <div class="photo-overlay">
            <p class="profile-name" id="profileName">Имя, возраст</p>
            <p class="profile-city" id="profileCity">Город
              <span class="geo-badge" title="Расстояние до вас">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="12" cy="7" r="5" fill="currentColor" />
                    <rect x="11" y="12" width="2" height="6" rx="1" fill="rgba(255,255,255,0.9)" />
                  </svg>
                  <span class="geo-distance">от тебя 5 км</span>
              </span>
            </p>
          </div>
        </section>

        <section class="info-card profile-search-style">
          <div class="info-header">
          </div>
          <p class="profile-bio" id="profileBio">Описание профиля, короткая биография и интересы.</p>
          <div class="profile-actions" id="profileActions">
          </div>
        </section>
      </section>
    </main>
    <footer class="actions-footer">
    </footer>
  </div>
  <script src="vvv-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
