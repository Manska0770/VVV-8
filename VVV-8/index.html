<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Поиск пары / выбор</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <main class="content">
      <section class="page profile-page">
        <section class="photo-card">
          <div class="photo photo-back" id="photo"></div>
          <div class="photo photo-front" id="photoNext"></div>
          <div class="photo-overlay">
            <p class="profile-name" id="profileName">Имя, возраст</p>
            <p class="profile-city" id="profileCity">Город
              <span class="geo-badge" title="Расстояние до вас">
                  <svg viewBox="0 0 64 80" width="18" height="18" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="32" cy="20" r="18" fill="#ff4b6b" />
                    <ellipse cx="42" cy="12" rx="6" ry="6" fill="#ff9aa4" opacity="0.65" />
                    <rect x="28" y="36" width="8" height="34" rx="4" fill="#dbe7ee" />
                  </svg>
                  <span class="geo-distance">от тебя 5 км</span>
              </span>
            </p>
          </div>
        </section>

        <section class="info-card profile-search-style">
          <div class="info-header">
          </div>
          <p class="profile-bio" id="profileBio">Описание профиля, короткая биография и интересы.</p>
          <div class="profile-actions" id="profileActions">
            <!-- Кнопки управления профилем удалены по просьбе заказчика -->
          </div>
        </section>
      </section>

      <section class="page profile-edit-page hidden">
        <section class="info-card filter-scroll profile-search-style">
          <div class="info-header">
            <span class="info-title profile-title">Мой профиль</span>
          </div>
          <div class="profile-edit-avatar">
            <div class="profile-avatar" id="profileAvatar">A</div>
            <button type="button" id="photoAddBtn" class="photo-add-btn" aria-label="Добавить фото">+</button>
            <input type="file" id="profileAvatarInput" accept="image/*" class="hidden" />
          </div>
          <div class="profile-edit-section">
            <div class="profile-edit-form">
              <div class="filter-group">
                <span class="filter-label">Имя</span>
                <input type="text" id="profileNameInput" class="filter-input profile-input" value="Алина" />
              </div>
              <div class="filter-group">
                <span class="filter-label">Сколько тебе лет</span>
                <input type="text" id="profileAgeInput" class="filter-input profile-input" placeholder="" />
              </div>
              <div class="filter-group">
                <span class="filter-label">Кто ты</span>
                <select id="profileGenderSelect" class="filter-input profile-select">
                  <option value="Девушка">Девушка</option>
                  <option value="Парень">Парень</option>
                </select>
              </div>
              <div class="filter-group">
                <span class="filter-label">Город</span>
                <div class="profile-city-input-wrap">
                  <input type="text" id="profileCityInput" class="filter-input profile-input" autocomplete="off" placeholder="Введите город или регион" />
                  <div class="autocomplete-list hidden" id="profileCitySuggestions"></div>
                </div>
              </div>
              <div class="filter-group">
                <label class="toggle-row">
                  <span>Показывать мое гео</span>
                  <button type="button" class="toggle" id="profileGeoToggle" aria-pressed="false"><span></span></button>
                </label>
              </div>
            </div>
          </div>
          <div class="profile-edit-section">
            <span class="profile-section-title">Цель знакомства</span>
            <div class="profile-pills" id="profileGoalPills">
              <button type="button" class="pill active" data-value="Отношение">Отношение</button>
              <button type="button" class="pill" data-value="Общение">Общение</button>
            </div>
          </div>
          <div class="profile-edit-section">
            <span class="profile-section-title">Расскажи о себе</span>
            <div class="profile-bio-card">
              <textarea id="profileBioInput" class="profile-bio-input" rows="5" placeholder="Будет отображаться в выдаче твоей анкеты"></textarea>
            </div>
          </div>
          <button type="button" class="search-btn" id="profileSaveBtn">Сохранить</button>
        </section>
      </section>

      <section class="page filter-page hidden">
        <section class="info-card filter-scroll">
          <div class="info-header">
            <span class="info-title">Параметры поиска</span>
          </div>
          <div class="filter-group location-group first-filter-group">
            <span class="filter-label">Где ищем</span>
            <input class="filter-input" id="locationInput" type="text" autocomplete="off" placeholder="Введите город или регион" />
            <span class="field-hint">Начните ввод, чтобы выбрать город или регион</span>
            <div class="autocomplete-list hidden" id="locationSuggestions"></div>
          </div>
          <div class="filter-group geo-group">
            <label class="toggle-row">
              <span>Поиск по гео</span>
              <button type="button" class="toggle" id="geoToggle" aria-pressed="false"><span></span></button>
            </label>
          </div>
          <div class="filter-group geo-radius hidden" id="geoRadiusContainer">
            <div class="age-labels">
              <span>Радиус</span>
              <span id="geoRadiusValue">25 км</span>
            </div>
            <div class="age-inputs">
              <div class="age-row">
                <label class="range-field">
                  <input type="range" id="geoRadiusRange" min="5" max="150" value="25" />
                </label>
                <input type="number" class="age-number" id="geoRadiusNumber" min="5" max="150" value="25" />
              </div>
            </div>
          </div>
          <div class="filter-group">
            <span class="filter-label">Меня интересуют</span>
            <div class="filter-pills" id="interestPills">
              <button type="button" class="pill active" data-group="interest" data-value="all">Все</button>
              <button type="button" class="pill" data-group="interest" data-value="men">Мужчины</button>
              <button type="button" class="pill" data-group="interest" data-value="women">Женщины</button>
            </div>
          </div>
          <div class="filter-group">
            <span class="filter-label">Показывать</span>
            <div class="filter-pills" id="showPills">
              <button type="button" class="pill active" data-group="show" data-value="all">Всех</button>
              <button type="button" class="pill" data-group="show" data-value="online">Онлайн</button>
              <button type="button" class="pill" data-group="show" data-value="new">Новых</button>
            </div>
          </div>
          <div class="filter-group age-group">
            <div class="age-labels">
              <span>Возраст</span>
              <span id="ageValue">18-30</span>
            </div>
            <div class="age-inputs">
              <div class="age-row">
                <label class="range-field">
                  <span>От</span>
                  <input type="range" id="ageMin" min="14" max="60" value="14" />
                </label>
                <input type="number" class="age-number" id="ageMinNumber" min="14" max="60" value="14" />
              </div>
              <div class="age-row">
                <label class="range-field">
                  <span>До</span>
                  <input type="range" id="ageMax" min="14" max="60" value="30" />
                </label>
                <input type="number" class="age-number" id="ageMaxNumber" min="14" max="60" value="30" />
              </div>
            </div>
          </div>
          <div class="filter-group toggle-group">
            <label class="toggle-row">
              <span>Искать только тех кто хочет общения</span>
              <button type="button" class="toggle" id="chatToggle" aria-pressed="false"><span></span></button>
            </label>
            <label class="toggle-row">
              <span>Искать только тех кто хочет отношения</span>
              <button type="button" class="toggle" id="relationshipToggle" aria-pressed="false"><span></span></button>
            </label>
          </div>
          <button type="button" class="search-btn" id="searchBtn">Искать</button>
        </section>
      </section>
    </main>

    <footer class="actions-footer">
      <div class="settings-menu-wrap">
        <button class="action-btn outline circle settings-btn" id="settingsBtn" aria-label="Настройки" aria-expanded="false">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M5 7.5H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 16.5H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="settings-menu hidden" id="settingsMenu">
          <a class="action-btn outline circle" id="profileBtn" aria-label="Мой профиль" href="profile.html">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 4C14.2091 4 16 5.79086 16 8C16 10.2091 14.2091 12 12 12C9.79086 12 8 10.2091 8 8C8 5.79086 9.79086 4 12 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 20C4 16.6863 6.68629 14 10 14H14C17.3137 14 20 16.6863 20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <button class="action-btn outline circle theme-btn" id="themeToggleBtn" aria-label="Переключить тему" data-theme="default">
            <img width="20" height="20" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAAnElEQVR4nK2UUQ7AIAhDi/H+V3ZfJggtYrJ+LdY+gbkZ7lpi3dqLBUTJ0kMBi3uUvwBg/lDVkRtio6+qOih5UxmXoKkMq3A1DtjQtDZcOLZagXzmyE6WaFTFoMnowihoi82w0vVwDzToOcZOZGf0cgaP+XKGnZafPsUhNnVhSf7ayDaILxVbVnOrYOkeMnVg7R9shD2pesvPMAD4ANMgIzEzlPAHAAAAAElFTkSuQmCC" alt="" aria-hidden="true" style="display:block;" />
          </button>
        </div>
      </div>
      <button class="action-btn outline circle" id="notificationsBtn" aria-label="Уведомления">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.75 9.75a6.75 6.75 0 1 0-13.5 0c0 5.385-3.864 9-3.864 9h21.228s-3.864-3.615-3.864-9Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14.25 21a2.25 2.25 0 1 1-4.5 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="action-btn outline circle" id="filterBtn" aria-label="Фильтр">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 5H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 11H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M10 17H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="18" cy="18" r="3" stroke="currentColor" stroke-width="2"/>
          <path d="M20.5 20.5L22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="action-btn outline circle" id="skipBtn" aria-label="Пропустить">✕</button>
      <button class="action-btn primary circle" id="likeBtn" aria-label="Лайк">❤</button>
    </footer>
  </div>
  <script src="vvv-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
