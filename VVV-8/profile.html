<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Профиль</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <main class="content">
      <section class="page profile-page">
        <section class="photo-card">
          <div class="photo photo-back" id="photo" style="background-image: url('https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=1200&q=80');"></div>
          <div class="photo-overlay">
            <p class="profile-name" id="profileName">Имя, возраст</p>
            <p class="profile-city" id="profileCity">Город
              <span class="geo-badge" title="Расстояние до вас">
                <svg viewBox="0 0 64 80" width="18" height="18" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="32" cy="20" r="18" fill="#ff4b6b" />
                  <ellipse cx="42" cy="12" rx="6" ry="6" fill="#ff9aa4" opacity="0.65" />
                  <rect x="28" y="36" width="8" height="34" rx="4" fill="#dbe7ee" />
                </svg>
                <span class="geo-distance">от тебя 5 км</span>
              </span>
            </p>
          </div>
        </section>

        <section class="info-card profile-search-style">
          <p class="profile-bio" id="profileBio">Описание профиля, короткая биография и интересы.</p>
        </section>
        <div class="profile-actions" id="profileActions">
          <div id="authControls"></div>
          <a class="search-btn" href="index.html#edit">Изменить анкету</a>
          <a class="search-btn outline" href="index.html">К поиску</a>
        </div>
      </section>
    </main>
  </div>
  <script src="vvv-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script>
    function renderCityWithGeo(city, distance, showGeo) {
      if (!showGeo) return city
      const dist = distance || (Math.floor(Math.random() * 50) + 1)
      return `${city} <span class="geo-badge" title="Расстояние до вас"><svg viewBox="0 0 64 80" width="18" height="18" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="20" r="18" fill="#ff4b6b" /><ellipse cx="42" cy="12" rx="6" ry="6" fill="#ff9aa4" opacity="0.65" /><rect x="28" y="36" width="8" height="34" rx="4" fill="#dbe7ee" /></svg><span class="geo-distance">от тебя ${dist} км</span></span>`
    }

    function getDatabaseState() {
      try {
        const raw = localStorage.getItem('vvv_database')
        return raw ? JSON.parse(raw) : null
      } catch (err) {
        return null
      }
    }

    function saveDatabaseState(db) {
      try {
        localStorage.setItem('vvv_database', JSON.stringify(db))
      } catch (err) {}
    }

    function getSupabaseClient() {
      if (!window.VVV_SUPABASE_CONFIG || !window.VVV_SUPABASE_CONFIG.SUPABASE_URL || !window.VVV_SUPABASE_CONFIG.SUPABASE_ANON_KEY) {
        return null
      }
      if (window.supabaseClient) return window.supabaseClient
      if (window.supabase) {
        window.supabaseClient = window.supabase.createClient(window.VVV_SUPABASE_CONFIG.SUPABASE_URL, window.VVV_SUPABASE_CONFIG.SUPABASE_ANON_KEY)
        return window.supabaseClient
      }
      return null
    }


    function loadProfile() {
      try {
        const rawDb = localStorage.getItem('vvv_database')
        let user = null
        if (rawDb) {
          try {
            const db = JSON.parse(rawDb)
            user = db && db.user ? db.user : null
          } catch (e) {
            user = null
          }
        }

        if (user) {
          const name = user.name || 'Алина'
          const age = user.age || ''
          const city = user.city || 'Казань'
          const bio = user.bio || 'Описание профиля, короткая биография и интересы.'
          const distance = user.distance || null
          const photo = user.photo || null
          const avatar = user.avatar || null
          const geoEnabled = user.geoEnabled === true

          document.getElementById('profileName').textContent = age ? `${name}, ${age}` : name
          document.getElementById('profileCity').innerHTML = renderCityWithGeo(city, distance, geoEnabled)
          document.getElementById('profileBio').textContent = bio
          const photoEl = document.getElementById('photo')
          if (photo) {
            photoEl.style.backgroundImage = `url('${photo}')`
            photoEl.textContent = ''
          } else if (avatar && avatar.length === 1) {
            photoEl.style.backgroundImage = 'none'
            photoEl.textContent = avatar
            photoEl.classList.add('avatar-letter')
          }
          return
        }

        const name = 'Алина'
        const age = ''
        const city = 'Казань'
        const bio = 'Описание профиля, короткая биография и интересы.'
        document.getElementById('profileName').textContent = name
        document.getElementById('profileCity').innerHTML = renderCityWithGeo(city)
        document.getElementById('profileBio').textContent = bio
      } catch (err) {
        // fallback
      }
    }

    (function() {
      try {
        const savedTheme = localStorage.getItem('theme') || 'default'
        document.body.classList.remove('theme-dark', 'theme-pink')
        if (savedTheme !== 'default') {
          document.body.classList.add(`theme-${savedTheme}`)
        }
      } catch (err) {
        // fallback if localStorage is not available
      }
      loadProfile()
    })()
  </script>
</body>
</html>
