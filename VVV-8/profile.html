<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Профиль</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell profile-shell">
    <main class="content">
      <section class="page profile-page profile-full-page">
        <section class="info-card profile-hero-card">
          <div class="profile-hero-left">
            <div class="profile-avatar profile-avatar-large" id="profileAvatar">A</div>
          </div>
          <div class="profile-hero-right">
            <div class="profile-hero-line">
              <div>
                <p class="profile-name" id="profileName">Имя, возраст</p>
                <p class="profile-subtitle" id="profileHandle">@username</p>
                <p class="profile-id hero-id">ID клиента: <span id="profileTelegramId">не подключен</span></p>
              </div>
              <span class="premium-badge" id="profilePremium">Premium</span>
            </div>
            <p class="profile-status" id="profileStatus">Telegram профиль подключен и работает</p>
            <div class="profile-stats">
              <div class="stat-card">
                <span class="stat-value" id="likesCount">0</span>
                <span class="stat-label">Лайков</span>
              </div>
              <div class="stat-card">
                <span class="stat-value" id="matchesCount">0</span>
                <span class="stat-label">Матчей</span>
              </div>
              <div class="stat-card">
                <span class="stat-value" id="viewsCount">0</span>
                <span class="stat-label">Просмотров</span>
              </div>
            </div>
          </div>
        </section>

        <section class="info-card profile-data-card">
          <div class="profile-meta profile-meta-grid">
            <div>
              <div class="meta-title">ID клиента</div>
              <div class="meta-value" id="profileTelegramId">не подключен</div>
            </div>
            <div>
              <div class="meta-title">Telegram</div>
              <div class="meta-value" id="profileTelegramHandle">не подключен</div>
            </div>
            <div>
              <div class="meta-title">Имя</div>
              <div class="meta-value" id="profileDisplayName">не задано</div>
            </div>
          </div>
          <div class="profile-info-block">
            <div class="profile-info-title">О себе</div>
            <p class="profile-bio" id="profileBio">Описание профиля, короткая биография и интересы.</p>
          </div>
          <div class="profile-actions">
            <a class="search-btn" href="index.html#edit">Изменить анкету</a>
            <a class="search-btn outline" href="index.html">К поиску</a>
          </div>
        </section>
      </section>
    </main>
  </div>
  <script src="vvv-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script>
    function parseTelegramWebAppUser(raw) {
      if (!raw) return null
      if (typeof raw === 'object') return raw.user || raw
      if (typeof raw !== 'string') return null
      const trimmed = raw.trim()
      if (!trimmed) return null
      if (trimmed.startsWith('{')) {
        try {
          const parsed = JSON.parse(trimmed)
          return parsed.user || parsed
        } catch (err) {
          return null
        }
      }
      if (trimmed.includes('user=')) {
        try {
          const params = new URLSearchParams(trimmed)
          const userJson = params.get('user')
          return userJson ? JSON.parse(userJson) : null
        } catch (err) {
          return null
        }
      }
      return null
    }

    function getTelegramWebAppObject() {
      const accessors = [
        () => window.Telegram?.WebApp,
        () => window.TelegramWebApp,
        () => window.WebApp,
        () => window.parent?.Telegram?.WebApp,
        () => window.parent?.TelegramWebApp,
        () => window.parent?.WebApp,
      ]
      for (const get of accessors) {
        try {
          const result = get()
          if (result) return result
        } catch (err) {
          // ignore cross-origin access
        }
      }
      return null
    }

    function getTelegramWebAppUser() {
      const webapp = getTelegramWebAppObject()
      if (!webapp) return null
      try {
        if (typeof webapp.ready === 'function') webapp.ready()
      } catch (err) {
        // ignore
      }
      const unsafeUser = parseTelegramWebAppUser(webapp.initDataUnsafe)
      if (unsafeUser && unsafeUser.id) return unsafeUser
      const dataUser = parseTelegramWebAppUser(webapp.initData)
      if (dataUser && dataUser.id) return dataUser
      return null
    }

    function loadDatabaseState() {
      try {
        const raw = localStorage.getItem('vvv_database')
        return raw ? JSON.parse(raw) : null
      } catch (err) {
        return null
      }
    }

    function saveDatabaseState(db) {
      try {
        localStorage.setItem('vvv_database', JSON.stringify(db))
      } catch (err) {}
    }

    function getStoredUser() {
      const state = loadDatabaseState()
      return state && state.user ? state.user : null
    }

    function updateStoredUser(updater) {
      const state = loadDatabaseState() || {}
      state.user = state.user || {}
      updater(state.user)
      saveDatabaseState(state)
      return state.user
    }

    function applyProfile(user) {
      const name = user.name || user.telegram_name || 'Алина'
      const age = user.age || ''
      const displayName = user.telegram_name || name
      const telegramHandle = user.telegram_username ? `@${user.telegram_username.replace(/^@/, '')}` : ''
      const telegramId = user.telegram_id || user.id || ''
      const photo = user.telegram_photo_url || user.photo || ''
      const bio = user.bio || 'Описание профиля, короткая биография и интересы.'
      const likes = user.likes || 0
      const matches = user.matches || 0
      const views = user.views || 0

      document.getElementById('profileName').textContent = age ? `${displayName}, ${age}` : displayName
      document.getElementById('profileHandle').textContent = telegramHandle || 'не подключен'
      document.getElementById('profileTelegramId').textContent = telegramId || 'не подключен'
      document.getElementById('profileTelegramHandle').textContent = telegramHandle || 'не подключен'
      document.getElementById('profileDisplayName').textContent = displayName
      document.getElementById('profileBio').textContent = bio
      document.getElementById('likesCount').textContent = likes
      document.getElementById('matchesCount').textContent = matches
      document.getElementById('viewsCount').textContent = views
      document.getElementById('profileStatus').textContent = telegramId ? 'Telegram профиль подключен и работает' : 'Telegram профиль не подключен'
      document.getElementById('profilePremium').textContent = 'Premium'

      const avatarEl = document.getElementById('profileAvatar')
      if (photo) {
        avatarEl.style.backgroundImage = `url('${photo}')`
        avatarEl.textContent = ''
        avatarEl.classList.add('profile-avatar-filled')
      } else {
        avatarEl.style.backgroundImage = 'none'
        avatarEl.textContent = displayName[0] ? displayName[0].toUpperCase() : 'A'
        avatarEl.classList.remove('profile-avatar-filled')
      }
    }

    function initProfilePage() {
      let user = getStoredUser() || {}
      const tgUser = getTelegramWebAppUser()
      if (tgUser && tgUser.id) {
        user = updateStoredUser((me) => {
          me.telegram_id = String(tgUser.id)
          me.telegram_username = tgUser.username || me.telegram_username
          me.telegram_name = tgUser.name || [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') || me.telegram_name
          me.telegram_photo_url = tgUser.photo_url || tgUser.photoURL || me.telegram_photo_url
        })
      }
      if (!Object.keys(user).length) {
        user = {
          name: 'Алина',
          telegram_id: '',
          telegram_username: '',
          telegram_name: '',
          telegram_photo_url: '',
          bio: 'Описание профиля, короткая биография и интересы.',
          likes: 0,
          matches: 0,
          views: 0,
        }
      }
      applyProfile(user)
    }

    initProfilePage()
  </script>
</body>
</html>
